{% extends "base.html" %}
{% block title %}{{ name }} — {{ run_id }}{% endblock %}
{% block content %}
<section class="card">
    <p><a href="/runs/{{ run_id }}">← back to run {{ run_id }}</a></p>
    <h1>{{ name }}</h1>
    <div class="markdown-body">
        {{ rendered_html | safe }}
    </div>
    <details><summary>Raw markdown</summary><pre class="artifact">{{ raw }}</pre></details>
</section>
{% endblock %}
